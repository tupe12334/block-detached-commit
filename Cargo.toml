[package]
name = "block-detached-commit"
version = "0.1.4"
edition = "2021"
description = "Git pre-commit hook that blocks commits in detached HEAD state"
license = "MIT"
repository = "https://github.com/tupe12334/block-detached-commit"
homepage = "https://github.com/tupe12334/block-detached-commit"
keywords = ["git", "hook", "pre-commit", "detached-head"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"

[[bin]]
name = "block-detached-commit"
path = "src/main.rs"

[dev-dependencies]
tempfile = "3"

[lints.clippy]
manual_let_else = "warn"
needless_pass_by_value = "warn"
option_if_let_else = "warn"
# Flag functions that return `Result`/`Option` but never produce `Err`/`None`.
# Such wrappers advertise a failure mode that cannot occur and force every caller
# into needless `?`/`unwrap`/`match` ceremony. The crate is clean today, so this
# acts as a regression guard keeping helper signatures honest.
unnecessary_wraps = "deny"
# Flag `match` blocks that contain two or more arms with identical bodies.
# These are usually a copy-paste slip or arms that should be merged with `|`.
# Catching them keeps `match` expressions DRY and surfaces accidental
# duplicate handling that can hide logic bugs.
match_same_arms = "warn"
