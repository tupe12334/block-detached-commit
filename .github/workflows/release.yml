name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package artifact
        shell: bash
        run: |
          EXT=""
          [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          SRC="target/${{ matrix.target }}/release/block-detached-commit${EXT}"
          ARTIFACT="block-detached-commit-${{ matrix.target }}${EXT}"
          cp "$SRC" "$ARTIFACT"
          sha256sum "$ARTIFACT" > "$ARTIFACT.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: block-detached-commit-*
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: block-detached-commit-*
          generate_release_notes: true

  publish-crates:
    name: Publish crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish npm
    needs: release
    runs-on: ubuntu-latest
    environment: npm  # matches the trusted publisher environment on npmjs.com
    permissions:
      contents: read
      id-token: write  # required for OIDC token exchange
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # registry-url intentionally omitted — specifying it makes setup-node inject
          # NODE_AUTH_TOKEN into .npmrc, which conflicts with OIDC trusted publisher auth.

      - name: Stamp version from tag
        working-directory: npm
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm version "$TAG" --no-git-tag-version

      - name: Publish
        working-directory: npm
        # --provenance triggers OIDC auth + attaches a signed build attestation.
        # NODE_AUTH_TOKEN is intentionally absent — OIDC replaces token-based auth.
        run: npm publish --access public --provenance

  publish-go:
    name: Tag Go module
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push go/ sub-module tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          git tag "go/${TAG}"
          git push origin "go/${TAG}"
